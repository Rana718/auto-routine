name: Deploy to VPS

on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        working-directory: ./backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auto-routine-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/auto-routine-backend:latest

      - name: Build and push frontend image
        working-directory: ./frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }} \
            --build-arg NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }} \
            -t ${{ secrets.DOCKER_USERNAME }}/auto-routine-frontend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/auto-routine-frontend:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/auto-routine-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/auto-routine-frontend:latest
            cd /root/deploy
            docker compose down
            docker compose up -d
